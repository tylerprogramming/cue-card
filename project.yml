name: CueCard
options:
  bundleIdPrefix: com.cuecard
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.1"

targets:
  CueCard:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: CueCard
    dependencies:
      - package: HotKey
    settings:
      base:
        INFOPLIST_FILE: CueCard/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.cuecard.CueCard
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
